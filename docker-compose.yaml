services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: $POSTGRES_DB
      POSTGRES_USER: $POSTGRES_USER
      POSTGRES_PASSWORD: $POSTGRES_PASSWORD
      POSTGRES_PORT: $POSTGRES_PORT
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # host:container
volumes:
  postgres_data:
